name: .NET Core Desktop

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  Solution_Name: LibraryMS.sln
  Test_Project_Path: LibraryMS.Tests/LibraryMS.Tests.csproj
  Wap_Project_Directory: LibraryMS.Win
  Wap_Project_Path: LibraryMS.Win/LibraryMS.Win.csproj
  Pfx_Base64: ${{ secrets.PFX_BASE64 }}
  Pfx_Password: ${{ secrets.PFX_PASSWORD }}

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore solution
        shell: pwsh
        run: |
          msbuild $env:Solution_Name /t:Restore /p:Configuration=${{ matrix.configuration }}

      - name: Run unit tests
        shell: pwsh
        run: |
          if (Test-Path $env:Test_Project_Path) {
            dotnet test $env:Test_Project_Path --configuration ${{ matrix.configuration }} --no-restore
          }
          else {
            Write-Host "Test project not found at $env:Test_Project_Path - skipping tests."
          }

      - name: Decode the pfx
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:Pfx_Base64")) {
            throw "PFX_BASE64 secret is missing."
          }

          $projectDir = Join-Path $env:GITHUB_WORKSPACE $env:Wap_Project_Directory

          if (-not (Test-Path $projectDir)) {
            throw "Wap project directory not found: $projectDir"
          }

          $pfx_cert_byte = [Convert]::FromBase64String("$env:Pfx_Base64")
          $certificatePath = Join-Path $projectDir "GitHubActionsWorkflow.pfx"

          [IO.File]::WriteAllBytes($certificatePath, $pfx_cert_byte)

          Write-Host "PFX created at: $certificatePath"

      - name: Build app package
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          msbuild $env:Wap_Project_Path `
            /p:Configuration=${{ matrix.configuration }} `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="x86|x64" `
            /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx `
            /p:PackageCertificatePassword=$env:Pfx_Password

      - name: Remove the pfx
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $certificatePath = Join-Path (Join-Path $env:GITHUB_WORKSPACE $env:Wap_Project_Directory) "GitHubActionsWorkflow.pfx"
          if (Test-Path $certificatePath) {
            Remove-Item $certificatePath -Force
          }

      - name: Upload build artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-${{ matrix.configuration }}
          path: ${{ env.Wap_Project_Directory }}\AppPackages
          if-no-files-found: warn
