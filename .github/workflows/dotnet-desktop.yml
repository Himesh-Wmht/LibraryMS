name: .NET Core Desktop

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  Pfx_Base64: ${{ secrets.PFX_BASE64 }}
  Pfx_Password: ${{ secrets.PFX_PASSWORD }}

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect project paths
        shell: pwsh
        run: |
          Write-Host "Workspace: $env:GITHUB_WORKSPACE"

          $solution = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter *.sln | Select-Object -First 1
          if (-not $solution) {
            throw "No .sln file found in repository."
          }

          $testProject = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter *.csproj |
            Where-Object { $_.Name -match 'Test|Tests' } |
            Select-Object -First 1

          $winProject = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter *.csproj |
            Where-Object { $_.Name -eq 'LibraryMS.Win.csproj' } |
            Select-Object -First 1

          if (-not $winProject) {
            $winProject = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter *.csproj |
              Where-Object { $_.FullName -match 'LibraryMS\.Win' } |
              Select-Object -First 1
          }

          if (-not $winProject) {
            throw "LibraryMS.Win.csproj not found."
          }

          $wapDir = Split-Path $winProject.FullName -Parent

          "Solution_Name=$($solution.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          if ($testProject) {
            "Test_Project_Path=$($testProject.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          "Wap_Project_Path=$($winProject.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Wap_Project_Directory=$wapDir" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Solution: $($solution.FullName)"
          if ($testProject) { Write-Host "Test Project: $($testProject.FullName)" }
          Write-Host "Win Project: $($winProject.FullName)"
          Write-Host "Project Directory: $wapDir"

      - name: Restore solution
        shell: pwsh
        run: |
          msbuild "$env:Solution_Name" /t:Restore /p:Configuration=${{ matrix.configuration }}

      - name: Run unit tests
        shell: pwsh
        run: |
          if ($env:Test_Project_Path -and (Test-Path "$env:Test_Project_Path")) {
            dotnet test "$env:Test_Project_Path" --configuration ${{ matrix.configuration }} --no-restore
          }
          else {
            Write-Host "No test project found. Skipping tests."
          }

      - name: Decode the pfx
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:Pfx_Base64")) {
            throw "PFX_BASE64 secret is missing."
          }

          if (-not (Test-Path "$env:Wap_Project_Directory")) {
            throw "Project directory not found: $env:Wap_Project_Directory"
          }

          $pfx_cert_byte = [Convert]::FromBase64String("$env:Pfx_Base64")
          $certificatePath = Join-Path "$env:Wap_Project_Directory" "GitHubActionsWorkflow.pfx"

          [IO.File]::WriteAllBytes($certificatePath, $pfx_cert_byte)

          Write-Host "PFX created at: $certificatePath"

      - name: Build app package
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:Pfx_Password")) {
            throw "PFX_PASSWORD secret is missing."
          }

          msbuild "$env:Wap_Project_Path" `
            /p:Configuration=${{ matrix.configuration }} `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="x86|x64" `
            /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx `
            /p:PackageCertificatePassword="$env:Pfx_Password"

      - name: Remove the pfx
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $certificatePath = Join-Path "$env:Wap_Project_Directory" "GitHubActionsWorkflow.pfx"
          if (Test-Path $certificatePath) {
            Remove-Item $certificatePath -Force
          }

      - name: Upload build artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: MSIX-Package-${{ matrix.configuration }}
          path: ${{ env.Wap_Project_Directory }}\AppPackages
          if-no-files-found: warn
